AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Credit Card Tracker - Discord-based expense classification (DynamoDB Backend)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
    
  DiscordClassificationsChannelId:
    Type: String
    Description: Channel ID for transaction classification
  DiscordSettlementsChannelId:
    Type: String
    Description: Channel ID for monthly settlements
    
  # Plaid Configuration
  PlaidEnv:
    Type: String
    Default: sandbox
    AllowedValues: [sandbox, development, production]
    
  # User Configuration
  UserAName:
    Type: String
    Default: Alex
  UserBName:
    Type: String
    Default: Beth
  DiscordUserA:
    Type: String
    Description: Discord Username for User A (e.g. chrisy076)
  DiscordUserB:
    Type: String
    Description: Discord Username for User B (e.g. bethy123)

Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        TABLE_NAME: !Ref TransactionsTable
        
        DISCORD_CLASSIFICATIONS_CHANNEL_ID: !Ref DiscordClassificationsChannelId
        DISCORD_SETTLEMENTS_CHANNEL_ID: !Ref DiscordSettlementsChannelId
        
        PLAID_ENV: !Ref PlaidEnv
        
        USER_A_NAME: !Ref UserAName
        USER_B_NAME: !Ref UserBName
        DISCORD_USER_A: !Ref DiscordUserA
        DISCORD_USER_B: !Ref DiscordUserB

Resources:
  TransactionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: date
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: DateIndex
          KeySchema:
            - AttributeName: pk
              KeyType: HASH
            - AttributeName: date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  DailyScanFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambdas/daily_scan.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TransactionsTable
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:cc-classifier/${Environment}/secrets-*
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 9 * * ? *)
            Description: Daily transaction scan
            Enabled: true
        MonthlySettlement:
          Type: Schedule
          Properties:
            Schedule: cron(0 10 1 * ? *)
            Description: Monthly settlement calculation
            Enabled: true
            Input: '{"resources": ["MonthlySettlement"]}'

  WebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambdas/webhook.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TransactionsTable
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:cc-classifier/${Environment}/secrets-*
      Events:
        DiscordWebhook:
          Type: Api
          Properties:
            Path: /discord
            Method: POST

Outputs:
  InteractionsEndpointUrl:
    Description: URL to paste into Discord Developer Portal -> General Information -> Interactions Endpoint URL
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/discord
  DynamoDBTableName:
    Description: Name of the DynamoDB table
    Value: !Ref TransactionsTable