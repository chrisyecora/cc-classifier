AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Credit Card Tracker - Discord-based expense classification

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
    
  # Discord Configuration
  DiscordBotToken:
    Type: String
    NoEcho: true
    Description: Bot Token from Discord Developer Portal
  DiscordPublicKey:
    Type: String
    NoEcho: true
    Description: Public Key from Discord Developer Portal
  DiscordClassificationsChannelId:
    Type: String
    Description: Channel ID for transaction classification
  DiscordSettlementsChannelId:
    Type: String
    Description: Channel ID for monthly settlements
    
  # Plaid Configuration
  PlaidClientId:
    Type: String
    NoEcho: true
  PlaidSecret:
    Type: String
    NoEcho: true
  PlaidAccessToken:
    Type: String
    NoEcho: true
  PlaidEnv:
    Type: String
    Default: sandbox
    AllowedValues: [sandbox, development, production]
    
  # User Configuration
  UserAName:
    Type: String
    Default: Alex
  UserBName:
    Type: String
    Default: Beth
  DiscordUserA:
    Type: String
    Description: Discord Username for User A (e.g. chrisy076)
  DiscordUserB:
    Type: String
    Description: Discord Username for User B (e.g. bethy123)

Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        S3_BUCKET: !Ref TransactionsBucket
        
        DISCORD_BOT_TOKEN: !Ref DiscordBotToken
        DISCORD_PUBLIC_KEY: !Ref DiscordPublicKey
        DISCORD_CLASSIFICATIONS_CHANNEL_ID: !Ref DiscordClassificationsChannelId
        DISCORD_SETTLEMENTS_CHANNEL_ID: !Ref DiscordSettlementsChannelId
        
        PLAID_CLIENT_ID: !Ref PlaidClientId
        PLAID_SECRET: !Ref PlaidSecret
        PLAID_ACCESS_TOKEN: !Ref PlaidAccessToken
        PLAID_ENV: !Ref PlaidEnv
        
        USER_A_NAME: !Ref UserAName
        USER_B_NAME: !Ref UserBName
        DISCORD_USER_A: !Ref DiscordUserA
        DISCORD_USER_B: !Ref DiscordUserB

Resources:
  TransactionsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub credit-card-tracker-${Environment}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  DailyScanFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub credit-card-tracker-daily-scan-${Environment}
      Handler: lambdas/daily_scan.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref TransactionsBucket
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 9 * * ? *)
            Description: Daily transaction scan
            Enabled: true
        MonthlySettlement:
          Type: Schedule
          Properties:
            Schedule: cron(0 10 1 * ? *)
            Description: Monthly settlement calculation
            Enabled: true

  WebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub credit-card-tracker-webhook-${Environment}
      Handler: lambdas/webhook.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref TransactionsBucket
      Events:
        DiscordWebhook:
          Type: Api
          Properties:
            Path: /discord
            Method: POST

Outputs:
  InteractionsEndpointUrl:
    Description: URL to paste into Discord Developer Portal -> General Information -> Interactions Endpoint URL
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/discord
  S3Bucket:
    Description: S3 bucket for transaction data
    Value: !Ref TransactionsBucket